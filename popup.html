<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellring — Notification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      /* Bellring brand tokens */
      --brand-primary:        #FFD24A;
      --brand-primary-hover:  #FFE07A;
      --brand-primary-active: #DAB139;
      --brand-secondary:        #3B82F6;
      --brand-secondary-hover:  #5B95F7;
      --brand-secondary-active: #256AD9;
      --brand-tertiary:       #E91E63;

      --neutral-50:  #F5F7FB;
      --neutral-100: #E6EAF2;
      --neutral-700: #1C2134;
      --neutral-800: #121626;
      --neutral-900: #0A0D1A;
      --neutral-950: #05070F;

      --semantic-success: #3CCB7F;
      --bell-glow:      0 0 40px rgba(255, 210, 74, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--neutral-900);
      /* Celebration ground: warm bellring gradient */
      background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-active) 100%);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeOut 0.3s ease-in-out 0.8s forwards;
    }

    .orbit-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .orbit-path {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px dashed rgba(10, 13, 26, 0.3);
      border-radius: 50%;
      animation: rotate 1s linear infinite;
    }

    .orbit-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--neutral-900);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform-origin: 0 40px;
      animation: orbit 0.5s linear infinite;
    }

    .orbit-dot:nth-child(2) {
      animation-delay: 0.16s;
      background: var(--brand-secondary);
    }

    .orbit-dot:nth-child(3) {
      animation-delay: 0.33s;
      background: var(--brand-tertiary);
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes orbit {
      0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    .container {
      position: relative;
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 90%;
      box-shadow: var(--bell-glow);
      border: 1px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      animation: slideIn 0.4s ease-out 0.6s forwards;
      cursor: default;
    }

    @keyframes slideIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .notification-icon {
      font-size: 60px;
      margin-bottom: 20px;
      opacity: 0;
      animation: bounceIn 0.4s ease-out 1s forwards;
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 1; transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    .sale-icon {
      color: var(--neutral-900);
    }

    .notification-icon-general {
      color: var(--brand-secondary);
    }

    .private-icon {
      color: var(--semantic-success);
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 36px;
      margin-bottom: 25px;
      color: var(--neutral-900);
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeInUp 0.3s ease-out 1.1s forwards;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .message {
      font-size: 18px;
      line-height: 1.6;
      margin: 25px 0;
      color: var(--neutral-800);
      opacity: 0;
      animation: fadeInUp 0.3s ease-out 1.2s forwards;
    }

    .highlight {
      background: var(--brand-secondary);
      color: #fff;
      padding: 8px 16px;
      border-radius: 25px;
      display: inline-block;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .bde-highlight {
      background: var(--brand-primary);
      color: var(--neutral-900);
      padding: 8px 16px;
      border-radius: 25px;
      display: inline-block;
      font-weight: 700;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      box-shadow: var(--bell-glow);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
      0% { box-shadow: 0 4px 15px rgba(255, 210, 74, 0.3); }
      50% { box-shadow: 0 4px 25px rgba(255, 210, 74, 0.6); }
      100% { box-shadow: 0 4px 15px rgba(255, 210, 74, 0.3); }
    }

    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeInUp 0.3s ease-out 1.3s forwards;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
    }

    .btn-primary {
      background: var(--neutral-900);
      color: var(--brand-primary);
      box-shadow: 0 4px 15px rgba(10, 13, 26, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 13, 26, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.25);
      color: var(--neutral-900);
      border: 1px solid rgba(10, 13, 26, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    /* Celebration Effects */
    .celebration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--brand-primary);
      animation: confetti-fall 3s linear infinite;
    }

    .confetti:nth-child(odd) {
      background: var(--brand-secondary);
      animation-delay: 0.5s;
    }

    .confetti:nth-child(3n) {
      background: var(--brand-tertiary);
      animation-delay: 1s;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .container {
        padding: 25px;
        margin: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .message {
        font-size: 16px;
      }

      .notification-icon {
        font-size: 50px;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 200px;
      }
    }

    /* Accessibility */
    .btn:focus {
      outline: 2px solid var(--neutral-900);
      outline-offset: 2px;
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .container * {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="orbit-loader">
      <div class="orbit-path"></div>
      <div class="orbit-dot"></div>
      <div class="orbit-dot"></div>
      <div class="orbit-dot"></div>
    </div>
  </div>

  <div class="celebration" id="celebration"></div>

  <div class="container">
    <div class="notification-icon" id="notificationIcon">
      <i class="fas fa-bell"></i>
    </div>

    <h1 id="title">New Notification!</h1>

    <div class="message" id="message">
      Loading notification...
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="closeButton" type="button">
        <i class="fas fa-times"></i> Close
      </button>
      <button class="btn btn-secondary" id="settingsButton" type="button">
        <i class="fas fa-cog"></i> Settings
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
